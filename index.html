<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoDash Ultimate - ENSAH</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        .light-theme { --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .controls { display: flex; gap: 10px; }
        select, button { padding: 10px; border-radius: 8px; border: 1px solid #334155; background: var(--card); color: var(--text); cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #334155; }
        .chart-container { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #334155; height: 400px; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>CryptoDash Ultimate 🚀</h1>
            <p>Par <strong>Zahra Fouima</strong> - ENSAH Ingénierie</p>
        </div>
        <div class="controls">
            <button onclick="document.body.classList.toggle('light-theme')">🌓 Mode</button>
            <select id="currency" onchange="fetchData()">
                <option value="mad">MAD (DH)</option>
                <option value="usd">USD ($)</option>
            </select>
            <button onclick="fetchData()" style="background: #3b82f6; color: white;">🔄 Actualiser</button>
        </div>
    </div>

    <div id="container" class="grid"></div>

    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>

    <script>
        let myChart;

        async function fetchData() {
            const currency = document.getElementById('currency').value;
            const symbols = { mad: 'DH', usd: '$' };
            
            try {
                const response = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=${currency}&ids=bitcoin,ethereum,cardano,solana,ripple`);
                const data = await response.json();

                // 1. Mise à jour des cartes
                document.getElementById('container').innerHTML = data.map(coin => `
                    <div class="card">
                        <img src="${coin.image}" width="30" style="margin-bottom:10px;">
                        <div style="font-weight:bold;">${coin.name}</div>
                        <div style="font-size:1.2rem; margin:5px 0;">${coin.current_price.toLocaleString()} ${symbols[currency]}</div>
                    </div>
                `).join('');

                // 2. Mise à jour du graphique
                const ctx = document.getElementById('myChart').getContext('2d');
                if (myChart) myChart.destroy();

                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.map(c => c.name),
                        datasets: [{
                            label: `Prix en ${symbols[currency]}`,
                            data: data.map(c => c.current_price),
                            backgroundColor: ['#f59e0b', '#6366f1', '#3b82f6', '#14b8a6', '#8b5cf6']
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { labels: { color: '#f8fafc' } } },
                        scales: { y: { ticks: { color: '#f8fafc' } }, x: { ticks: { color: '#f8fafc' } } }
                    }
                });
            } catch (error) {
                console.error("Erreur API:", error);
            }
        }

        fetchData();
    </script>
</body>
</html>
