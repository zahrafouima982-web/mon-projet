<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoDash Ultimate - ENSAH</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; --green: #00ffcc; --chart-up: #4ade80; --chart-down: #f87171;
        }
        .light-theme {
            --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --accent: #0284c7; --green: #10b981;
        }
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; transition: 0.3s;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { color: var(--accent); margin: 0; font-size: 1.8rem; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        #searchBar {
            flex-grow: 1; padding: 12px; border-radius: 10px; border: 1px solid #334155;
            background: var(--card); color: var(--text); outline: none;
        }
        select, .theme-btn {
            padding: 10px; border-radius: 10px; border: 1px solid #334155;
            background: var(--card); color: var(--text); cursor: pointer;
        }
        .crypto-card {
            background: var(--card); padding: 15px; margin-bottom: 15px;
            border-radius: 15px; display: grid; grid-template-columns: 1.5fr 1fr 1fr;
            align-items: center; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .crypto-card:hover { transform: scale(1.01); border: 1px solid var(--accent); }
        .info { display: flex; align-items: center; }
        img { width: 35px; height: 35px; margin-right: 12px; }
        .price-section { text-align: right; padding-right: 15px; }
        .price { font-weight: bold; color: var(--green); font-size: 1.1rem; }
        .chart-container { height: 50px; width: 100%; }
        #loader { text-align: center; margin-top: 50px; color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-flex">
            <h1>CryptoDash Ultimate 🚀</h1>
            <button class="theme-btn" onclick="toggleTheme()">🌓 Mode</button>
        </div>
        <p style="opacity: 0.7; font-size: 0.8rem; margin-top: -15px; margin-bottom: 20px;">
            Par <strong>Zahra Fouima</strong> - ENSAH Ingénierie
        </p>
        <div class="controls">
            <input type="text" id="searchBar" placeholder="Filtrer les actifs..." onkeyup="filterCryptos()">
            <select id="currencySelect" onchange="changeCurrency()">
                <option value="usd">USD ($)</option>
                <option value="mad">MAD (DH)</option>
            </select>
        </div>
        <div id="loader">Initialisation du flux de données...</div>
        <div id="crypto-list"></div>
    </div>

    <script>
        let allCryptos = [];
        let currentCurrency = 'usd';

        // Données de secours réalistes (Sparkline inclus)
        const demoData = [
            { id: "bitcoin", name: "Bitcoin", symbol: "btc", image: "https://assets.coingecko.com/coins/images/1/large/bitcoin.png", current_price: 64000, price_change_percentage_24h: 2.5, sparkline_in_7d: { price: [62000, 63000, 62500, 64000] } },
            { id: "ethereum", name: "Ethereum", symbol: "eth", image: "https://assets.coingecko.com/coins/images/279/large/ethereum.png", current_price: 3500, price_change_percentage_24h: -1.2, sparkline_in_7d: { price: [3600, 3550, 3580, 3500] } }
        ];

        function toggleTheme() { document.body.classList.toggle('light-theme'); }

        function changeCurrency() {
            currentCurrency = document.getElementById('currencySelect').value;
            fetchCrypto();
        }

        async function fetchCrypto() {
            try {
                const response = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=${currentCurrency}&order=market_cap_desc&per_page=10&page=1&sparkline=true`);
                if (!response.ok) throw new Error("API Limit");
                allCryptos = await response.json();
                displayCryptos(allCryptos);
            } catch (error) {
                console.warn("Utilisation du mode démo (API bloquée)");
                displayCryptos(demoData);
            } finally {
                const loader = document.getElementById('loader');
                if (loader) loader.style.display = 'none';
            }
        }

        function displayCryptos(data) {
            const list = document.getElementById('crypto-list');
            if (!list) return;
            list.innerHTML = '';
            
            data.forEach(coin => {
                const card = document.createElement('div');
                card.className = 'crypto-card';
                const symbol = currentCurrency === 'usd' ? '$' : ' DH';
                const price = currentCurrency === 'usd' ? symbol + coin.current_price.toLocaleString() : coin.current_price.toLocaleString() + symbol;

                card.innerHTML = `
                    <div class="info">
                        <img src="${coin.image}">
                        <div>
                            <strong>${coin.name}</strong>
                            <div style="font-size: 0.7rem; opacity: 0.6;">${coin.symbol.toUpperCase()}</div>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="chart-${coin.id}"></canvas>
                    </div>
                    <div class="price-section">
                        <div class="price">${price}</div>
                        <div style="font-size: 0.8rem; color: ${coin.price_change_percentage_24h > 0 ? '#4ade80' : '#f87171'}">
                            ${coin.price_change_percentage_24h.toFixed(2)}%
                        </div>
                    </div>
                `;
                list.appendChild(card);
                renderChart(coin);
            });
        }

        function renderChart(coin) {
            const canvas = document.getElementById(`chart-${coin.id}`);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: coin.sparkline_in_7d.price.map((_, i) => i),
                    datasets: [{
                        data: coin.sparkline_in_7d.price,
                        borderColor: coin.price_change_percentage_24h > 0 ? '#4ade80' : '#f87171',
                        borderWidth: 2, fill: false, pointRadius: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { display: false } }
                }
            });
        }

        function filterCryptos() {
            const val = document.getElementById('searchBar').value.toLowerCase();
            const filtered = allCryptos.filter(c => c.name.toLowerCase().includes(val) || c.symbol.toLowerCase().includes(val));
            displayCryptos(filtered.length > 0 ? filtered : demoData);
        }

        fetchCrypto();
    </script>
</body>
</html>
